name: Seed Feature Branches

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: "Feature id to seed, or all"
        required: true
        default: all

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seed:
    name: Seed branches and integration PRs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync roadmap issues and labels
        run: python3 script/sync_roadmap_issues.py --feature-id "${{ inputs.feature_id }}"

      - name: Seed feature branches
        run: python3 script/seed_feature_branches.py --feature-id "${{ inputs.feature_id }}"
